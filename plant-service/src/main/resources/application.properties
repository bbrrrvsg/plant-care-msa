server.port=8082
spring.application.name=plant-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.datasource.url=jdbc:mysql://localhost:3306/plantcare
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# 성장 일지 사진 업로드 경로 (상대 경로면 plant-service 작업 디렉토리 기준).
file.upload-dir=src/main/static/images

# 멀티파트 업로드 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

perenual.api.key=${PERENUAL_API_KEY:}
nongsaro.api.key=${NONGSARO_API_KEY:}
openweather.api.key=${OPENWEATHER_API_KEY:}
plant.book.reload=false