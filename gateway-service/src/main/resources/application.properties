server.port=8080

spring.application.name=gateway-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns=http://localhost:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[1].id=plant-service
spring.cloud.gateway.routes[1].uri=lb://PLANT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/plant/**
spring.cloud.gateway.routes[2].id=sensor-service
spring.cloud.gateway.routes[2].uri=lb://SENSOR-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/sensor/**
spring.cloud.gateway.routes[3].id=ai-service
spring.cloud.gateway.routes[3].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/ai/**
spring.cloud.gateway.routes[4].id=diagnosis-service
spring.cloud.gateway.routes[4].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/diagnosis/**
spring.cloud.gateway.routes[5].id=sensor-api
spring.cloud.gateway.routes[5].uri=lb://SENSOR-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/sensor/**
spring.cloud.gateway.routes[6].id=book
spring.cloud.gateway.routes[6].uri=lb://PLANT-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/book/**
spring.cloud.gateway.routes[7].id=growth-log
spring.cloud.gateway.routes[7].uri=lb://PLANT-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/growth-log/**
spring.cloud.gateway.routes[8].id=weather
spring.cloud.gateway.routes[8].uri=lb://PLANT-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/weather/**
spring.codec.max-in-memory-size=10MB
